name: bitmap_heap_lossy
covers_node_types: ["Bitmap Heap Scan"]
detects:
  node_type: "Bitmap Heap Scan"
  min_recheck_waste_ratio: 0.3
severity: medium
explanation: >
  The Bitmap Heap Scan is operating in lossy mode: work_mem was too small to
  hold the exact bitmap, so PostgreSQL fell back to tracking which heap pages
  contain matching rows rather than which exact rows match. Every row on a
  lossy page must be fetched from the heap and rechecked against the condition —
  rows that fail the recheck are wasted heap reads. When rows_removed_by_recheck
  / (actual_rows + rows_removed_by_recheck) exceeds 0.30, more than 30% of all
  heap reads are wasted. At 0.60+ most of the I/O budget is consumed by recheck
  failures; the plan is materially degraded by the lossy fallback. Root cause:
  the bitmap for this query's index condition exceeded the work_mem budget during
  execution.
fix_template: >
  1) Increase work_mem so the bitmap fits entirely in memory and stays exact:
       SET work_mem = '64MB';   -- adjust to match the bitmap size at your data volume
     Monitor "Lossy Heap Blocks" in EXPLAIN output: it should drop to 0 once
     work_mem is sufficient. If you can't raise work_mem globally, raise it for
     this session or connection only.
  2) If the query runs frequently and work_mem can't be raised enough, add a
     more selective filter earlier in the plan to reduce the number of rows
     entering the bitmap. A composite index that includes the most selective
     condition first can reduce the bitmap size and avoid the lossy fallback:
       CREATE INDEX CONCURRENTLY ON {table} (<selective_col>, <other_col>);
  3) If the lossy mode persists even with adequate work_mem, check whether the
     index is over a very wide range of values (e.g. a low-selectivity predicate).
     In that case, consider whether an index scan or seq scan would actually be
     cheaper than a lossy bitmap scan with heavy rechecking.
