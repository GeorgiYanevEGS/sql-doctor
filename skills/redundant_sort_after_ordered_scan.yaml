name: redundant_sort_after_ordered_scan
covers_node_types: ["Sort"]
detects:
  node_type: "Sort"
  child_node_type: ["Index Scan", "Index Only Scan"]
  requires_schema_context: true
  sort_key_matches_child_index: true
severity: medium
explanation: >
  A Sort node sits directly on top of an Index Scan or Index Only Scan, and the
  sort key matches the index's leading columns in the same order. The index already
  returns rows in that order, so the Sort is redundant — the planner should eliminate
  it automatically when the query's ORDER BY exactly matches the index order (including
  ASC/DESC). This often indicates a missing or mismatched index direction.
fix_template: >
  1) Confirm the query's ORDER BY matches the index's leading key columns
     exactly (including ASC/DESC): run "\d+ {index}" in psql.
  2) If the sort key and index order are identical, check whether the planner
     hint enable_sort=off exposes the redundancy: the plan cost should be lower.
  3) If the index direction is wrong (e.g. index is ASC but query needs DESC),
     create a new index with the correct sort direction on {table}.
