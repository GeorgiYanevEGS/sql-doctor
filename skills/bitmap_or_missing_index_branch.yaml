name: bitmap_or_missing_index_branch
covers_node_types: ["BitmapOr"]
detects:
  node_type: "BitmapOr"
  requires_schema_context: true
  any_child:
    node_type: "Seq Scan"
    seq_scan_filter_column_unindexed: true
severity: high
explanation: >
  A BitmapOr node is combining bitmap results from multiple OR-branches, but
  at least one branch fell back to a full Seq Scan on a column with no supporting
  index. While sibling branches resolved their predicate with an index, this branch
  scanned the entire table. A Seq Scan inside a BitmapOr is especially expensive
  because its result must be re-combined with the index bitmaps from other branches,
  and a single unindexed OR-branch negates most of the benefit of the indexed ones.
fix_template: >
  Identify the Seq Scan branch inside the BitmapOr (visible in EXPLAIN output as a
  Seq Scan child with a Filter condition) and add an index on the column referenced
  in that filter:

    -- If the Seq Scan filters on txn_type:
    CREATE INDEX CONCURRENTLY idx_{table}_txn_type ON {table} (txn_type);

  After adding the index, re-run EXPLAIN (ANALYZE) and confirm the Seq Scan child
  of BitmapOr is replaced by a Bitmap Index Scan.
